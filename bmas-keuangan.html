<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMAS Keuangan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --navy:#0E2A47; --navy-2:#123458; --navy-3:#1B4674;
  --green:#1E9E6A; --green-soft:#E3F4EC;
  --paper:#F5F6F4; --card:#FFFFFF; --ink:#17242F; --muted:#6B7A88;
  --line:#E2E7EB; --red:#CF4B3F; --red-soft:#FBEAE8; --amber:#E8A13D; --amber-soft:#FBF1DF;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:14.5px}
h1,h2,h3,.display{font-family:'Archivo',sans-serif}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.04em}

/* ---------- LOGIN ---------- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-3) 100%);padding:20px}
.login-card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.brand-mark{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brand-logo{width:46px;height:46px;border-radius:12px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.brand-logo img{width:100%;height:100%;object-fit:cover}
.brand-mark h1{font-size:19px;font-weight:700;line-height:1.2}
.brand-mark p{font-size:12px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:.15s}
.btn-primary{background:var(--green);color:#fff;width:100%;margin-top:20px}
.btn-primary:hover{background:#178a5b}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-3)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line)}
.btn-danger-soft{background:var(--red-soft);color:var(--red)}
.err-msg{color:var(--red);font-size:13px;margin-top:12px;display:none}

/* ---------- APP SHELL ---------- */
#appView{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:232px;background:var(--navy);color:#fff;padding:22px 14px;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;transition:transform .2s}
.sidebar .brand-mark{padding:0 8px;margin-bottom:30px}
.sidebar .brand-mark h1{color:#fff;font-size:16px}
.sidebar .brand-mark p{color:#8FA5BB}
.nav-item{display:flex;align-items:center;gap:11px;padding:10.5px 12px;border-radius:10px;color:#B9C8D6;font-weight:500;font-size:14px;margin-bottom:3px;background:transparent;width:100%;text-align:left}
.nav-item svg{flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:var(--green);color:#fff;font-weight:600}
.sidebar-foot{margin-top:auto;padding:12px 8px;border-top:1px solid rgba(255,255,255,.12)}
.sidebar-foot .u-name{font-weight:600;font-size:13.5px}
.sidebar-foot .u-sub{font-size:11.5px;color:#8FA5BB;margin-bottom:10px}
.main{flex:1;margin-left:232px;padding:26px 30px 90px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-head h2{font-size:22px;font-weight:700}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:3px}

/* ---------- CARDS & TABLES ---------- */
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.stat .lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat .val{font-size:21px;font-weight:600;margin-top:6px}
.stat .note{font-size:12px;color:var(--muted);margin-top:4px}
.stat.hero{background:var(--navy);border-color:var(--navy);color:#fff}
.stat.hero .lbl{color:#9DB3C8}
.stat.hero .note{color:#9DB3C8}
.pos{color:var(--green)} .neg{color:var(--red)}
.hero .pos{color:#4ED99E}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:10px 12px;border-bottom:1.5px solid var(--line);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
td.amt,th.amt{text-align:right}
.tbl-wrap{overflow-x:auto}
.chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
.chip-green{background:var(--green-soft);color:#157a51}
.chip-red{background:var(--red-soft);color:var(--red)}
.chip-amber{background:var(--amber-soft);color:#a86d1c}
.chip-navy{background:#E6EDF5;color:var(--navy)}
.icon-btn{background:transparent;padding:6px;border-radius:8px;color:var(--muted);display:inline-flex}
.icon-btn:hover{background:var(--paper);color:var(--ink)}
.empty{padding:36px 16px;text-align:center;color:var(--muted);font-size:13.5px}
.empty b{display:block;color:var(--ink);font-family:'Archivo';font-size:15px;margin-bottom:5px}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(14,42,71,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;padding:24px}
.modal h3{font-size:17px;margin-bottom:4px}
.modal .m-actions{display:flex;gap:10px;margin-top:22px}
.modal .m-actions .btn{flex:1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ---------- BARS (dashboard mini chart) ---------- */
.bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:14px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar-pair{display:flex;gap:3px;align-items:flex-end;width:100%;justify-content:center;flex:1}
.bar{width:38%;max-width:20px;border-radius:4px 4px 0 0;min-height:2px}
.bar.in{background:var(--green)} .bar.out{background:var(--red)}
.bar-lbl{font-size:10.5px;color:var(--muted)}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:4px}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}

/* ---------- TOAST ---------- */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:99px;font-size:13.5px;font-weight:500;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ---------- RESPONSIVE ---------- */
.menu-btn{display:none}
@media(max-width:960px){
  .g4{grid-template-columns:repeat(2,1fr)}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:18px 16px 90px}
  .menu-btn{display:inline-flex;background:var(--navy);color:#fff;padding:9px;border-radius:10px}
  .row2{grid-template-columns:1fr}
}
@media(max-width:560px){.g4,.g2{grid-template-columns:1fr}}
.topbar-m{display:none;align-items:center;gap:12px;margin-bottom:16px}
@media(max-width:960px){.topbar-m{display:flex}}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35;display:none}
.scrim.show{display:block}
</style>
</head>

/* ================= KONFIGURASI SUPABASE (isi ini kalau deploy di luar Claude) ================= */
const SUPABASE_URL = 'https://deriiyunolpfpxrbbxsc.supabase.co'; // cth: https://xxxxxxxxxxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable__J2diiisBeunrxkqud1WBA_0wM1he_T'; // anon/public key dari Supabase > Project Settings > API
let _sb = null;
function getSupabase(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  if(!_sb && window.supabase) _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return _sb;
}
const USE_CLAUDE_STORAGE = typeof window.storage !== 'undefined';

async function sGet(k){
  try{
    if(USE_CLAUDE_STORAGE){const r=await window.storage.get(k);return r?JSON.parse(r.value):null}
    const sb=getSupabase();if(!sb)return null;
    const {data,error}=await sb.from('kv_store').select('value').eq('key',k).maybeSingle();
    if(error||!data)return null;
    return data.value;
  }catch(e){return null}
}
async function sSet(k,v){
  try{
    if(USE_CLAUDE_STORAGE){await window.storage.set(k,JSON.stringify(v));return true}
    const sb=getSupabase();if(!sb){toast('Supabase belum dikonfigurasi — data tidak tersimpan');return false}
    const {error}=await sb.from('kv_store').upsert({key:k,value:v},{onConflict:'key'});
    if(error){toast('Gagal menyimpan data ke server: '+error.message);return false}
    return true;
  }catch(e){toast('Gagal menyimpan data');return false}
}
async function saveDB(){await sSet(K_DATA,DB)}


function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),2200)}

/* ================= CALC HELPERS ================= */
function accBalance(a){
  let b=+a.opening||0;
  DB.transactions.forEach(t=>{if(t.accountId===a.id)b+=t.type==='in'?+t.amount:-t.amount});
  return b;
}
const totalSaldo=()=>DB.accounts.reduce((s,a)=>s+accBalance(a),0);
const sumTrans=(type,ym)=>DB.transactions.filter(t=>t.type===type&&(!ym||t.date.startsWith(ym))).reduce((s,t)=>s+ +t.amount,0);
const sumDebt=list=>list.filter(x=>x.status!=='lunas').reduce((s,x)=>s+ +x.amount,0);
const catName=id=>(DB.categories.find(c=>c.id===id)||{}).name||'-';
const accName=id=>(DB.accounts.find(a=>a.id===id)||{}).name||'-';

/* ================= DASHBOARD ================= */
function rDashboard(){
  if(!window._dashPeriod)window._dashPeriod=new Date().toISOString().slice(0,7);
  const ym=window._dashPeriod;
  const masuk=sumTrans('in',ym),keluar=sumTrans('out',ym);
  // 6 bulan terakhir dari bulan yang dipilih
  let months=[];
  const [yy,mm]=ym.split('-').map(Number);
  for(let i=5;i>=0;i--){const d=new Date(yy,mm-1,1);d.setMonth(d.getMonth()-i);const key=d.toISOString().slice(0,7);months.push({key,lbl:['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][d.getMonth()],in:sumTrans('in',key),out:sumTrans('out',key)})}
  const max=Math.max(1,...months.flatMap(m=>[m.in,m.out]));
  const recent=[...DB.transactions].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,6);
  return `
  <div class="page-head"><div><h2>Dashboard</h2><div class="sub">Ringkasan keuangan — ${fmtDate(today())}</div></div>
  <input type="month" value="${ym}" style="width:auto" onchange="window._dashPeriod=this.value;render()"></div>
  <div class="grid g4">
    <div class="card stat hero"><div class="lbl">Total Saldo</div><div class="val mono">${fmt(totalSaldo())}</div><div class="note">${DB.accounts.length} akun (bank & cash)</div></div>
    <div class="card stat"><div class="lbl">Pemasukan ${fmtPeriod(ym)}</div><div class="val mono pos">${fmt(masuk)}</div></div>
    <div class="card stat"><div class="lbl">Pengeluaran ${fmtPeriod(ym)}</div><div class="val mono neg">${fmt(keluar)}</div></div>
    <div class="card stat"><div class="lbl">Selisih ${fmtPeriod(ym)}</div><div class="val mono ${masuk-keluar>=0?'pos':'neg'}">${fmt(masuk-keluar)}</div></div>
  </div>
  <div class="grid g2" style="margin-top:14px">
    <div class="card stat"><div class="lbl">Total Hutang (Belum Lunas)</div><div class="val mono neg">${fmt(sumDebt(DB.hutang))}</div><div class="note">${DB.hutang.filter(x=>x.status!=='lunas').length} item aktif</div></div>
    <div class="card stat"><div class="lbl">Total Piutang (Belum Lunas)</div><div class="val mono" style="color:var(--amber)">${fmt(sumDebt(DB.piutang))}</div><div class="note">${DB.piutang.filter(x=>x.status!=='lunas').length} item aktif</div></div>
  </div>
  <div class="grid g2" style="margin-top:14px">
    <div class="card stat"><div class="lbl">SPT Belum Dibayar</div><div class="val mono" style="color:#a86d1c">${fmt(sumPajak(DB.spt))}</div><div class="note">${DB.spt.filter(x=>x.status!=='dibayar').length} SPT tertunggak</div></div>
    <div class="card stat"><div class="lbl">Denda Pajak Belum Dibayar</div><div class="val mono neg">${fmt(sumPajak(DB.denda))}</div><div class="note">${DB.denda.filter(x=>x.status!=='dibayar').length} denda tertunggak</div></div>
  </div>
  <div class="grid g2" style="margin-top:14px">
    <div class="card">
      <div class="stat"><div class="lbl">Arus Kas 6 Bulan (s.d. ${fmtPeriod(ym)})</div></div>
      <div class="bars">${months.map(m=>`<div class="bar-col"><div class="bar-pair"><div class="bar in" style="height:${Math.round(m.in/max*100)}%"></div><div class="bar out" style="height:${Math.round(m.out/max*100)}%"></div></div><div class="bar-lbl">${m.lbl}</div></div>`).join('')}</div>
      <div class="legend"><span><span class="dot" style="background:var(--green)"></span>Pemasukan</span><span><span class="dot" style="background:var(--red)"></span>Pengeluaran</span></div>
    </div>
    <div class="card">
      <div class="stat"><div class="lbl">Transaksi Terakhir</div></div>
      ${recent.length?`<div class="tbl-wrap"><table><tbody>${recent.map(t=>`<tr><td><b>${esc(t.desc||catName(t.categoryId))}</b><div style="font-size:11.5px;color:var(--muted)">${fmtDate(t.date)} · ${esc(accName(t.accountId))}</div></td><td class="amt mono ${t.type==='in'?'pos':'neg'}">${t.type==='in'?'+':'−'} ${fmt(t.amount)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty"><b>Belum ada transaksi</b>Mulai catat lewat menu Pemasukan / Pengeluaran.</div>`}
    </div>
  </div>`;
}

function mTrans(type,id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');

async function delTrans(id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');if(!confirm('Hapus transaksi ini?'))return;DB.transactions=DB.transactions.filter(x=>x.id!==id);await saveDB();render();toast('Transaksi dihapus')}

        <button class="icon-btn" onclick="mDebt('hutang','${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button>
        <button class="icon-btn" onclick="delDebt('hutang','${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg></button>
      </td>`)}</tr>`).join('')}</tbody></table></div>`
    :`<div class="empty"><b>Belum ada hutang</b>${isAdmin()?'Klik "+ Tambah Hutang" untuk mulai mencatat.':'Semua tercatat rapi di sini nanti.'}</div>`;

  const sectionCard=(kat)=>{
    const items=list.filter(x=>(x.kategori||'Project')===kat).sort((a,b)=>(a.status==='lunas')-(b.status==='lunas')||(a.due||'').localeCompare(b.due||''));

  return `

  ${DIVISI_HUTANG.map(sectionCard).join('')}`;

function rPiutang(){
  if(!window._piutangFilter)window._piutangFilter={month:'all',status:'belum'};
  const f=window._piutangFilter;
  let list=DB.piutang.slice();
  if(f.month!=='all')list=list.filter(x=>(x.tanggal||'').startsWith(f.month));
  if(f.status==='belum')list=list.filter(x=>x.status!=='lunas');
  else if(f.status==='lunas')list=list.filter(x=>x.status==='lunas');
  list.sort((a,b)=>(a.status==='lunas')-(b.status==='lunas')||(a.due||'').localeCompare(b.due||''));

  const groupA=['Filter','Project PT. Berkah Mandiri Abadi Sentosa'];
  const groupB=['CV. Rizki Powerindo'];
  const inA=x=>groupA.includes(x.kategori||'Filter');
  const inB=x=>groupB.includes(x.kategori);
  const totalA=list.filter(x=>inA(x)&&x.status!=='lunas').reduce((s,x)=>s+ +x.amount,0);
  const totalB=list.filter(x=>inB(x)&&x.status!=='lunas').reduce((s,x)=>s+ +x.amount,0);
  const monthOpts=[...new Set(DB.piutang.map(x=>x.tanggal).filter(Boolean).map(d=>d.slice(0,7)))].sort().reverse();

  const table=(items,defaultKat)=>items.length?`<div class="tbl-wrap"><table>

        <tbody>${items.map(x=>`<tr style="${x.status==='lunas'?'opacity:.55':''}">
          <td><b>${esc(x.party)}</b></td>
          <td><span class="chip chip-navy">${esc(x.kategori||'Filter')}</span></td>
          <td>${esc(x.desc)||'-'}</td>
          <td style="white-space:nowrap">${fmtDate(x.tanggal)}</td>
          <td style="white-space:nowrap">${fmtDate(x.due)}</td>

          <td class="amt mono"><b>${fmt(x.amount)}</b></td>
          ${adm(`<td class="amt">
            <button class="icon-btn" title="${x.status==='lunas'?'Tandai belum lunas':'Tandai lunas'}" onclick="toggleDebt('piutang','${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></button>
            <button class="icon-btn" onclick="mDebt('piutang','${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button>
            <button class="icon-btn" onclick="delDebt('piutang','${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg></button>
          </td>`)}</tr>`).join('')}</tbody></table></div>`
    :`<div class="empty"><b>Belum ada piutang</b>${isAdmin()?`Klik "+ Tambah Piutang" untuk mulai mencatat.`:'Semua tercatat rapi di sini nanti.'}</div>`;

      <option value="belum" ${f.status==='belum'?'selected':''}>Belum Lunas</option>

      <option value="all" ${f.status==='all'?'selected':''}>Semua Status</option>
    </select>
  </div></div>

  <div class="grid g2" style="margin-bottom:16px">
    <div class="card stat" style="background:var(--amber-soft);border-color:transparent">

function mDebt(kind,id,defaultKategori){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const isH=kind==='hutang';
  const katOpts=isH?DIVISI_HUTANG:KATEGORI_PIUTANG;
  const x=DB[kind].find(v=>v.id===id)||{party:'',desc:'',due:'',amount:'',status:'belum',kategori:defaultKategori||katOpts[0],tanggal:today()};
  openModal(`<h3>${id?'Edit':'Tambah'} ${isH?'Hutang':'Piutang'}</h3>
    <label>${isH?'Kepada (Vendor/Pihak)':'Dari (Customer/Pihak)'}</label><input id="fParty" value="${esc(x.party)}" placeholder="${isH?'cth: Toko Besi Jaya':'cth: RS Pratiwi'}">
    <label>Kategori</label><select id="fKategori">${katOpts.map(k=>`<option value="${k}" ${x.kategori===k?'selected':''}>${k}</option>`).join('')}</select>
    <label>Keterangan</label><input id="fDesc" value="${esc(x.desc)}" placeholder="cth: Pembelian besi hollow">
    <div class="row2">${isH?'':`<div><label>Tanggal</label><input id="fTanggal" type="date" value="${x.tanggal||today()}"></div>`}
    <div><label>Jumlah (Rp)</label><input id="fAmt" type="number" value="${x.amount}" placeholder="0"></div></div>
    <div class="row2"><div><label>Jatuh Tempo</label><input id="fDue" type="date" value="${x.due}"></div>
    <div><label>Status</label><select id="fStat"><option value="belum" ${x.status!=='lunas'?'selected':''}>Belum Lunas</option><option value="lunas" ${x.status==='lunas'?'selected':''}>Lunas</option></select></div></div>
    <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="margin-top:0" onclick="saveDebt('${kind}','${id||''}')">Simpan</button></div>`);
}
async function saveDebt(kind,id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const party=fParty.value.trim(),amt=+fAmt.value;
  if(!party)return toast('Nama pihak wajib diisi');
  if(!amt||amt<=0)return toast('Jumlah harus lebih dari 0');
  const obj={party,desc:fDesc.value.trim(),amount:amt,due:fDue.value,status:fStat.value,kategori:fKategori.value};
  if(kind==='piutang'){obj.tanggal=fTanggal.value||today()}
  if(id){Object.assign(DB[kind].find(v=>v.id===id),obj)}else{DB[kind].push({id:uid(),...obj})}
  await saveDB();closeModal();render();toast('Data tersimpan');
}
async function toggleDebt(kind,id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');const x=DB[kind].find(v=>v.id===id);x.status=x.status==='lunas'?'belum':'lunas';await saveDB();render()}
async function delDebt(kind,id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');if(!confirm('Hapus data ini?'))return;DB[kind]=DB[kind].filter(v=>v.id!==id);await saveDB();render();toast('Data dihapus')}

/* ================= RUTIN BULANAN ================= */
const NAMA_RUTIN_UMUM=['Listrik','Internet','BPJS Kesehatan','BPJS Ketenagakerjaan','Air (PDAM)','Sewa Kantor','Telepon'];
function rRutinBulanan(){
  if(!window._rutinMonth)window._rutinMonth=new Date().toISOString().slice(0,7);
  if(!window._rutinFilter)window._rutinFilter={month:'all',status:'belum'};
  const f=window._rutinFilter;
  const bulan=window._rutinMonth;
  const monthOpts=[...new Set([bulan,...DB.rutin.map(x=>x.period)])].sort().reverse();
  let list=DB.rutin.slice();
  if(f.month!=='all')list=list.filter(x=>x.period===f.month);
  if(f.status==='belum')list=list.filter(x=>x.status!=='sudah');
  else if(f.status==='sudah')list=list.filter(x=>x.status==='sudah');
  list.sort((a,b)=>(a.status==='sudah')-(b.status==='sudah')||b.period.localeCompare(a.period)||esc(a.nama).localeCompare(esc(b.nama)));
  const belum=DB.rutin.filter(x=>x.status!=='sudah');
  const totalList=list.reduce((s,x)=>s+ +x.amount,0);
  const totalBelum=belum.reduce((s,x)=>s+ +x.amount,0);
  return `
  <div class="page-head"><div><h2>Rutin Bulanan</h2><div class="sub">Pengeluaran rutin tiap bulan — listrik, BPJS, internet, dll</div></div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <select style="width:auto" onchange="window._rutinFilter.month=this.value;render()">
      <option value="all" ${f.month==='all'?'selected':''}>Semua Bulan</option>
      ${monthOpts.map(m=>`<option value="${m}" ${f.month===m?'selected':''}>${fmtPeriod(m)}</option>`).join('')}
    </select>
    <select style="width:auto" onchange="window._rutinFilter.status=this.value;render()">
      <option value="belum" ${f.status==='belum'?'selected':''}>Belum Dibayar</option>
      <option value="sudah" ${f.status==='sudah'?'selected':''}>Sudah Dibayar</option>
      <option value="all" ${f.status==='all'?'selected':''}>Semua Status</option>
    </select>
    ${adm(`<button class="btn btn-navy" onclick="mRutin(null,'${bulan}')">+ Tambah Rutin Bulanan</button>`)}
  </div></div>

  <div class="grid g2" style="margin-bottom:16px">
    <div class="card stat"><div class="lbl">Total ${f.month==='all'?'Semua Bulan':fmtPeriod(f.month)}${f.status!=='all'?' — '+(f.status==='sudah'?'Sudah Dibayar':'Belum Dibayar'):''}</div><div class="val mono">${fmt(totalList)}</div><div class="note">${list.length} tagihan</div></div>
    <div class="card stat" style="background:var(--amber-soft);border-color:transparent">
      <div class="lbl">Belum Dibayar (Semua Bulan)</div><div class="val mono" style="color:#a86d1c">${fmt(totalBelum)}</div>
      <div class="note" style="color:#a86d1c">${belum.length} tagihan tertunggak</div></div>
  </div>

  <div class="card" style="padding:0">
  ${list.length?`<div class="tbl-wrap"><table>
    <thead><tr><th>Periode</th><th>Nama Tagihan</th><th>Keterangan</th><th>Tanggal Pembayaran</th><th>Status</th><th class="amt">Jumlah</th>${adm('<th style="width:120px"></th>')}</tr></thead>
    <tbody>${list.map(x=>`<tr style="${x.status==='sudah'?'opacity:.55':''}">
      <td style="white-space:nowrap"><b>${fmtPeriod(x.period)}</b></td>
      <td><b>${esc(x.nama)}</b></td>
      <td>${esc(x.desc)||'-'}</td>
      <td style="white-space:nowrap">${x.tglBayar?fmtDate(x.tglBayar):'-'}</td>
      <td><span class="chip ${x.status==='sudah'?'chip-green':'chip-amber'}">${x.status==='sudah'?'Sudah Dibayar':'Belum Dibayar'}</span></td>
      <td class="amt mono"><b>${fmt(x.amount)}</b></td>
      ${adm(`<td class="amt">
        <button class="icon-btn" title="${x.status==='sudah'?'Tandai belum dibayar':'Tandai sudah dibayar'}" onclick="toggleRutin('${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></button>
        <button class="icon-btn" onclick="mRutin('${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button>
        <button class="icon-btn" onclick="delRutin('${x.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg></button>
      </td>`)}</tr>`).join('')}</tbody></table></div>`
  :`<div class="empty"><b>${f.status==='belum'?'Tidak ada tagihan yang belum dibayar':'Belum ada tagihan rutin'}</b>${isAdmin()?`Klik "+ Tambah Rutin Bulanan" untuk mulai mencatat.`:'Data akan tampil di sini setelah admin mencatat.'}</div>`}
  </div>`;
}
function mRutin(id,defaultPeriod){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const x=DB.rutin.find(v=>v.id===id)||{nama:'',desc:'',period:defaultPeriod||window._rutinMonth||new Date().toISOString().slice(0,7),tglBayar:'',amount:'',status:'belum'};
  openModal(`<h3>${id?'Edit':'Tambah'} Rutin Bulanan</h3>
    <label>Nama Tagihan</label><input id="fNama" list="fNamaList" value="${esc(x.nama)}" placeholder="cth: Listrik">
    <datalist id="fNamaList">${NAMA_RUTIN_UMUM.map(n=>`<option value="${n}">`).join('')}</datalist>
    <label>Keterangan</label><input id="fDesc" value="${esc(x.desc)}" placeholder="cth: Token listrik kantor bulan ini">
    <div class="row2"><div><label>Periode (Bulan)</label><input id="fPeriod" type="month" value="${x.period}"></div>
    <div><label>Jumlah (Rp)</label><input id="fAmt" type="number" value="${x.amount}" placeholder="0"></div></div>
    <div class="row2"><div><label>Tanggal Pembayaran</label><input id="fTglBayar" type="date" value="${x.tglBayar||''}"></div>
    <div><label>Status</label><select id="fStat"><option value="belum" ${x.status!=='sudah'?'selected':''}>Belum Dibayar</option><option value="sudah" ${x.status==='sudah'?'selected':''}>Sudah Dibayar</option></select></div></div>
    <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="margin-top:0" onclick="saveRutin('${id||''}')">Simpan</button></div>`);
}
async function saveRutin(id){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const nama=fNama.value.trim(),amt=+fAmt.value;
  if(!nama)return toast('Nama tagihan wajib diisi');
  if(!fPeriod.value)return toast('Pilih periode bulan');
  if(!amt||amt<=0)return toast('Jumlah harus lebih dari 0');
  const obj={nama,desc:fDesc.value.trim(),period:fPeriod.value,tglBayar:fTglBayar.value,amount:amt,status:fStat.value};
  if(id){Object.assign(DB.rutin.find(v=>v.id===id),obj)}else{DB.rutin.push({id:uid(),...obj})}
  window._rutinMonth=obj.period;
  await saveDB();closeModal();render();toast('Data rutin bulanan tersimpan');
}
async function toggleRutin(id){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const x=DB.rutin.find(v=>v.id===id);
  x.status=x.status==='sudah'?'belum':'sudah';
  if(x.status==='sudah'&&!x.tglBayar)x.tglBayar=today();
  await saveDB();render();
}
async function delRutin(id){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  if(!confirm('Hapus data rutin bulanan ini?'))return;
  DB.rutin=DB.rutin.filter(v=>v.id!==id);await saveDB();render();toast('Data dihapus');
}

/* ================= LAPORAN & PDF ================= */
function rLaporan(){
  const ym=new Date().toISOString().slice(0,7);
  return `
  <div class="page-head"><div><h2>Laporan</h2><div class="sub">Export rekap keuangan ke PDF</div></div></div>
  <div class="grid g2">
    <div class="card">
      <h3 style="font-size:15.5px;margin-bottom:2px">Laporan Bulanan</h3>
      <p style="font-size:13px;color:var(--muted)">Rekap satu bulan penuh.</p>
      <label>Pilih Bulan</label><input id="repMonth" type="month" value="${ym}">
      <button class="btn btn-primary" onclick="exportPDF('month')">Export PDF Bulanan</button>
    </div>
    <div class="card">
      <h3 style="font-size:15.5px;margin-bottom:2px">Laporan Per Tanggal</h3>
      <p style="font-size:13px;color:var(--muted)">Rekap rentang tanggal tertentu.</p>
      <div class="row2">
        <div><label>Dari</label><input id="repFrom" type="date" value="${ym}-01"></div>
        <div><label>Sampai</label><input id="repTo" type="date" value="${today()}"></div>
      </div>
      <button class="btn btn-primary" onclick="exportPDF('range')">Export PDF Per Tanggal</button>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="stat"><div class="lbl">Isi Laporan PDF</div></div>
    <p style="font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.7">Ringkasan saldo semua akun, total pemasukan & pengeluaran periode terpilih, rincian transaksi, rekap per kategori, serta posisi hutang & piutang berjalan — lengkap dengan kop BMAS.</p>
  </div>`;

function exportPDF(mode){
  let from,to,label;
  if(mode==='month'){
    const m=document.getElementById('repMonth').value;
    if(!m)return toast('Pilih bulan dulu');
    from=m+'-01';
    const d=new Date(+m.slice(0,4),+m.slice(5,7),0);
    to=m+'-'+String(d.getDate()).padStart(2,'0');
    const bln=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    label='Bulan '+bln[+m.slice(5,7)-1]+' '+m.slice(0,4);
  }else{
    from=document.getElementById('repFrom').value;to=document.getElementById('repTo').value;
    if(!from||!to)return toast('Isi tanggal dari & sampai');
    if(from>to)return toast('Tanggal "dari" harus sebelum "sampai"');
    label='Periode '+fmtDate(from)+' – '+fmtDate(to);
  }
  const inRange=t=>t.date>=from&&t.date<=to;
  const masuk=DB.transactions.filter(t=>t.type==='in'&&inRange(t));
  const keluar=DB.transactions.filter(t=>t.type==='out'&&inRange(t));
  const tIn=masuk.reduce((s,t)=>s+ +t.amount,0),tOut=keluar.reduce((s,t)=>s+ +t.amount,0);

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const NAVY=[14,42,71],GREEN=[30,158,106],RED=[207,75,63],GRAY=[107,122,136];
  const W=doc.internal.pageSize.getWidth();
  const rp=n=>'Rp '+Number(n||0).toLocaleString('id-ID');

  // Kop
  doc.setFillColor(...NAVY);doc.rect(0,0,W,30,'F');
  doc.setFillColor(...GREEN);doc.rect(0,30,W,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(15);
  doc.text('PT. BERKAH MANDIRI ABADI SENTOSA',14,13);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Laporan Rekap Keuangan',14,20);
  doc.setFontSize(9);doc.text(label,14,26);
  let y=42;

  // Ringkasan
  doc.setTextColor(...NAVY);doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('Ringkasan Periode',14,y);y+=3;
  doc.autoTable({startY:y,theme:'grid',styles:{fontSize:9.5,cellPadding:3},headStyles:{fillColor:NAVY},
    head:[['Keterangan','Nilai']],
    body:[
      ['Total Pemasukan',rp(tIn)],
      ['Total Pengeluaran',rp(tOut)],
      ['Selisih (Surplus/Defisit)',rp(tIn-tOut)],
      ['Total Saldo Seluruh Akun (saat ini)',rp(totalSaldo())],
      ['Total Hutang Belum Lunas',rp(sumDebt(DB.hutang))],
      ['Total Piutang Belum Lunas',rp(sumDebt(DB.piutang))],
      ['Total SPT Belum Dibayar',rp(sumPajak(DB.spt))],
      ['Total Denda Pajak Belum Dibayar',rp(sumPajak(DB.denda))],
    ],columnStyles:{1:{halign:'right',fontStyle:'bold'}}});
  y=doc.lastAutoTable.finalY+10;

  // Saldo per akun
  if(DB.accounts.length){
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...NAVY);
    doc.text('Saldo Akun',14,y);y+=3;
    doc.autoTable({startY:y,theme:'striped',styles:{fontSize:9.5,cellPadding:3},headStyles:{fillColor:NAVY},
      head:[['Akun','Tipe','Saldo Berjalan']],
      body:DB.accounts.map(a=>[a.name,a.type==='bank'?'Bank':'Cash',rp(accBalance(a))]),
      columnStyles:{2:{halign:'right'}}});
    y=doc.lastAutoTable.finalY+10;
  }

  // Transaksi
  const transTable=(title,list,color)=>{
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...NAVY);
    if(y>260){doc.addPage();y=20}
    doc.text(title,14,y);y+=3;
    doc.autoTable({startY:y,theme:'striped',styles:{fontSize:9,cellPadding:2.5},headStyles:{fillColor:color},
      head:[['Tanggal','Keterangan','Kategori','Akun','Jumlah']],
      body:list.length?list.sort((a,b)=>a.date.localeCompare(b.date)).map(t=>[fmtDate(t.date),t.desc||'-',catName(t.categoryId),accName(t.accountId),rp(t.amount)]):[['-','Tidak ada data','-','-','-']],
      columnStyles:{4:{halign:'right'}},
      foot:[['','','','Total',rp(list.reduce((s,t)=>s+ +t.amount,0))]],
      footStyles:{fillColor:[240,242,244],textColor:NAVY,fontStyle:'bold',halign:'right'}});
    y=doc.lastAutoTable.finalY+10;
  };
  transTable('Rincian Pemasukan',masuk,GREEN);
  transTable('Rincian Pengeluaran',keluar,RED);

  // Rekap per kategori
  const catRecap=[...new Set([...masuk,...keluar].map(t=>t.categoryId))].map(cid=>{
    const items=[...masuk,...keluar].filter(t=>t.categoryId===cid);
    return [catName(cid),items[0].type==='in'?'Pemasukan':'Pengeluaran',rp(items.reduce((s,t)=>s+ +t.amount,0))];
  });
  if(catRecap.length){
    if(y>250){doc.addPage();y=20}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...NAVY);
    doc.text('Rekap per Kategori',14,y);y+=3;
    doc.autoTable({startY:y,theme:'striped',styles:{fontSize:9.5,cellPadding:3},headStyles:{fillColor:NAVY},
      head:[['Kategori','Tipe','Total']],body:catRecap,columnStyles:{2:{halign:'right'}}});
    y=doc.lastAutoTable.finalY+10;
  }

  // Hutang & Piutang aktif
  const debtTable=(title,list)=>{
    const act=list.filter(x=>x.status!=='lunas');
    if(y>250){doc.addPage();y=20}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...NAVY);
    doc.text(title,14,y);y+=3;
    doc.autoTable({startY:y,theme:'striped',styles:{fontSize:9,cellPadding:2.5},headStyles:{fillColor:NAVY},
      head:[['Pihak','Keterangan','Jatuh Tempo','Jumlah']],
      body:act.length?act.map(x=>[x.party,x.desc||'-',fmtDate(x.due),rp(x.amount)]):[['-','Tidak ada yang belum lunas','-','-']],
      columnStyles:{3:{halign:'right'}},
      foot:[['','','Total',rp(act.reduce((s,x)=>s+ +x.amount,0))]],
      footStyles:{fillColor:[240,242,244],textColor:NAVY,fontStyle:'bold',halign:'right'}});
    y=doc.lastAutoTable.finalY+10;
  };
  debtTable('Hutang Belum Lunas',DB.hutang);
  debtTable('Piutang Belum Lunas',DB.piutang);

  // Pajak: SPT & denda belum dibayar
  const taxTable=(title,list,cols)=>{
    const act=list.filter(x=>x.status!=='dibayar');
    if(y>250){doc.addPage();y=20}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...NAVY);
    doc.text(title,14,y);y+=3;
    doc.autoTable({startY:y,theme:'striped',styles:{fontSize:9,cellPadding:2.5},headStyles:{fillColor:NAVY},
      head:[cols],
      body:act.length?act.map(x=>title.includes('SPT')?[fmtPeriod(x.period),x.jenis,fmtDate(x.due),rp(x.amount)]:[x.jenis,x.desc||'-',fmtDate(x.due),rp(x.amount)]):[['-','Tidak ada yang belum dibayar','-','-']],
      columnStyles:{3:{halign:'right'}},
      foot:[['','','Total',rp(act.reduce((s,x)=>s+ +x.amount,0))]],
      footStyles:{fillColor:[240,242,244],textColor:NAVY,fontStyle:'bold',halign:'right'}});
    y=doc.lastAutoTable.finalY+10;
  };
  if(DB.spt.length)taxTable('SPT Belum Dibayar',DB.spt,['Periode','Jenis Pajak','Jatuh Tempo','Jumlah']);
  if(DB.denda.length)taxTable('Denda Pajak Belum Dibayar',DB.denda,['Jenis Denda','Keterangan','Jatuh Tempo','Jumlah']);

  // Footer tiap halaman
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(8);doc.setTextColor(...GRAY);doc.setFont('helvetica','normal');
    doc.text(`Dibuat ${fmtDate(today())} oleh ${USER?USER.name:'-'} · BMAS Keuangan`,14,290);
    doc.text(`Hal. ${i}/${pages}`,W-14,290,{align:'right'});
  }
  doc.save(`Laporan_Keuangan_BMAS_${from}_sd_${to}.pdf`);
  toast('PDF berhasil dibuat');
}

/* ================= AKTIVA TETAP (DAFTAR ASET & PENYUSUTAN) ================= */
function atCalc(a){
  const saldoAkhirPerolehan=(+a.perolehanAwal||0)+(+a.perolehanTambah||0);
  const saldoAkhirPenyusutan=(+a.penyusutanAwal||0)+(+a.penyusutanTambah||0);
  const nilaiBuku=saldoAkhirPerolehan-saldoAkhirPenyusutan;
  return{saldoAkhirPerolehan,saldoAkhirPenyusutan,nilaiBuku};
}
const totalNilaiBukuAset=()=>DB.aktivaTetap.reduce((s,a)=>s+atCalc(a).nilaiBuku,0);
function rAktivaTetap(){
  const list=DB.aktivaTetap;
  const tPerolehanAwal=list.reduce((s,a)=>s+(+a.perolehanAwal||0),0);
  const tPerolehanTambah=list.reduce((s,a)=>s+(+a.perolehanTambah||0),0);
  const tPenyusutanAwal=list.reduce((s,a)=>s+(+a.penyusutanAwal||0),0);
  const tPenyusutanTambah=list.reduce((s,a)=>s+(+a.penyusutanTambah||0),0);
  const tNilaiBuku=totalNilaiBukuAset();
  return `
  <div class="page-head"><div><h2>Aktiva Tetap</h2><div class="sub">Daftar aset tetap & penyusutan — dipakai di Neraca SPT Tahunan</div></div>
  ${adm('<button class="btn btn-navy" onclick="mAktiva()">+ Tambah Aset</button>')}</div>
  <div class="card stat" style="margin-bottom:14px"><div class="lbl">Total Nilai Buku Aktiva Tetap</div><div class="val mono">${fmt(tNilaiBuku)}</div><div class="note">${list.length} aset tercatat</div></div>

/* ================= SPT TAHUNAN (LABA RUGI & NERACA) ================= */
function accBalanceAt(a,cutoff){
  let b=+a.opening||0;
  DB.transactions.forEach(t=>{if(t.accountId===a.id&&t.date<=cutoff)b+=t.type==='in'?+t.amount:-t.amount});
  return b;
}
function labaRugiData(year){
  const from=year+'-01-01',to=year+'-12-31';
  const inRange=t=>t.date>=from&&t.date<=to;
  const masuk=DB.transactions.filter(t=>t.type==='in'&&inRange(t));
  const keluar=DB.transactions.filter(t=>t.type==='out'&&inRange(t));
  const catSub=(c)=>c.subtype||(c.type==='in'?'penjualan':'operasional');

  const penjualanCat=DB.categories.filter(c=>c.type==='in'&&catSub(c)==='penjualan').map(c=>({nama:c.name,total:masuk.filter(t=>t.categoryId===c.id).reduce((s,t)=>s+ +t.amount,0)})).filter(x=>x.total>0);
  const lainCat=DB.categories.filter(c=>c.type==='in'&&catSub(c)==='lain').map(c=>({nama:c.name,total:masuk.filter(t=>t.categoryId===c.id).reduce((s,t)=>s+ +t.amount,0)})).filter(x=>x.total>0);
  const hppCat=DB.categories.filter(c=>c.type==='out'&&catSub(c)==='hpp').map(c=>({nama:c.name,total:keluar.filter(t=>t.categoryId===c.id).reduce((s,t)=>s+ +t.amount,0)})).filter(x=>x.total>0);
  const admCat=DB.categories.filter(c=>c.type==='out'&&catSub(c)==='operasional').map(c=>({nama:c.name,total:keluar.filter(t=>t.categoryId===c.id).reduce((s,t)=>s+ +t.amount,0)})).filter(x=>x.total>0);

  const totalPenjualan=penjualanCat.reduce((s,x)=>s+x.total,0);
  const totalHPP=hppCat.reduce((s,x)=>s+x.total,0);
  const labaKotor=totalPenjualan-totalHPP;

  const bebanGaji=DB.gaji.filter(x=>x.period.startsWith(year)).reduce((s,x)=>s+gajiCalc(x).totalPendapatan,0);
  const penyusutanTahun=DB.aktivaTetap.reduce((s,a)=>s+(+a.penyusutanTambah||0),0);
  const totalAdmUmum=admCat.reduce((s,x)=>s+x.total,0)+bebanGaji+penyusutanTahun;

  const totalLain=lainCat.reduce((s,x)=>s+x.total,0);
  const labaBersih=labaKotor-totalAdmUmum+totalLain;

  return{penjualanCat,hppCat,admCat,lainCat,totalPenjualan,totalHPP,labaKotor,bebanGaji,penyusutanTahun,totalAdmUmum,totalLain,labaBersih};
}
function neracaData(year){
  const cutoff=year+'-12-31';
  const ns=DB.neracaSettings[year]||{};
  const kas=DB.accounts.filter(a=>a.type==='cash').reduce((s,a)=>s+accBalanceAt(a,cutoff),0);
  const bank=DB.accounts.filter(a=>a.type==='bank').reduce((s,a)=>s+accBalanceAt(a,cutoff),0);
  const piutangDagang=sumDebt(DB.piutang);
  const persediaan=+ns.persediaan||0;
  const pajakDibayarDimuka=+ns.pajakDibayarDimuka||0;
  const totalAktivaLancar=kas+bank+piutangDagang+persediaan+pajakDibayarDimuka;
  const aktivaTetapNilaiBuku=totalNilaiBukuAset();
  const totalAktiva=totalAktivaLancar+aktivaTetapNilaiBuku;

  const hutangUsaha=sumDebt(DB.hutang);
  const hutangPajak=sumPajak(DB.spt)+sumPajak(DB.denda);
  const biayaMasihHarusDibayar=+ns.biayaMasihHarusDibayar||0;
  const hutangLainnya=+ns.hutangLainnya||0;
  const totalHutangLancar=hutangUsaha+hutangPajak+biayaMasihHarusDibayar+hutangLainnya;

  const modalDisetor=+ns.modalDisetor||0;
  const labaDitahan=+ns.labaDitahanAwal||0;
  const labaTahunBerjalan=labaRugiData(year).labaBersih;
  const totalEkuitas=modalDisetor+labaDitahan+labaTahunBerjalan;
  const totalHutangModal=totalHutangLancar+totalEkuitas;
  const selisih=totalAktiva-totalHutangModal;

  return{kas,bank,piutangDagang,persediaan,pajakDibayarDimuka,totalAktivaLancar,aktivaTetapNilaiBuku,totalAktiva,
    hutangUsaha,hutangPajak,biayaMasihHarusDibayar,hutangLainnya,totalHutangLancar,
    modalDisetor,labaDitahan,labaTahunBerjalan,totalEkuitas,totalHutangModal,selisih};
}

/* ================= GAJI KARYAWAN ================= */
function gajiCalc(x){
  const lemburTotal=(+x.lemburJam||0)*(+x.lemburRate||0);
  const insentifTotal=(+x.insentifHari||0)*(+x.insentifRate||0);
  const dinasTotal=(+x.dinasHari||0)*(+x.dinasRate||0);
  const totalPendapatan=(+x.gajiPokok||0)+(+x.tunjangan||0)+lemburTotal+insentifTotal+dinasTotal;
  const totalPotongan=(+x.kasbon||0)+(+x.pinjaman||0)+(+x.bpjsKes||0)+(+x.bpjsTK||0)+(+x.arisan||0)+(+x.potongCuti||0);
  const totalDiterima=totalPendapatan-totalPotongan;
  return {lemburTotal,insentifTotal,dinasTotal,totalPendapatan,totalPotongan,totalDiterima};
}

function autofillGaji(){
  if(window._gajiEditId)return; // jangan timpa data saat mode edit
  const nama=document.getElementById('fNama').value.trim();
  if(!nama)return;
  const records=DB.gaji.filter(x=>x.nama.toLowerCase()===nama.toLowerCase()).sort((a,b)=>b.period.localeCompare(a.period));
  if(!records.length)return;
  const last=records[0];
  fGajiPokok.value=last.gajiPokok||'';
  fTunjangan.value=last.tunjangan||'';
  fLemburLabel.value=last.lemburLabel||'Lembur';
  fLemburRate.value=last.lemburRate||'';
  fInsentifRate.value=last.insentifRate||'';
  fDinasRate.value=last.dinasRate||'';
  fBpjsKes.value=last.bpjsKes||'';
  fBpjsTK.value=last.bpjsTK||'';
  fPinjamanKet.value=last.pinjamanKet||'';
  toast('Terisi otomatis dari data bulan terakhir — silakan sesuaikan jika perlu');
}

function exportSlip(id){
  const x=DB.gaji.find(v=>v.id===id);if(!x)return;
  const c=gajiCalc(x);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const W=doc.internal.pageSize.getWidth();
  const rp=n=>n?'Rp':'Rp';
  const num=n=>(+n)?Number(n).toLocaleString('id-ID'):'-';

  // ---- KOP (logo & identitas perusahaan - JANGAN DIUBAH) ----
  doc.addImage(SLIP_LOGO_BMAS,'PNG',15,10,21,27);
  doc.setFont('helvetica','bold');doc.setFontSize(15.5);doc.setTextColor(20,20,20);
  doc.text('PT. BERKAH MANDIRI ABADI SENTOSA',40,17);
  doc.setFont('helvetica','normal');doc.setFontSize(9.5);
  doc.text('General Contractor & Filtration System Specialist',40,22.5);
  doc.addImage(SLIP_LOGO_SMART,'PNG',W-58,20,42,13);
  doc.setDrawColor(203,58,58);doc.setLineWidth(0.6);doc.line(15,39,195,39);

  let y=54;
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(0,0,0);
  doc.text('SLIP GAJI KARYAWAN',W/2,y,{align:'center'});
  doc.setLineWidth(0.4);doc.line(W/2-27,y+1.3,W/2+27,y+1.3);
  y+=13;

  doc.setFont('helvetica','normal');doc.setFontSize(10.5);
  doc.text('Nama',20,y);doc.text(': '+x.nama,45,y);y+=6;
  doc.text('Periode',20,y);doc.text(': '+fmtPeriodRange(x.period),45,y);y+=11;

  const X_LABEL=20,X_CNT=100,X_UNIT=104,X_RATE=142,X_RP=147,X_AMT=195;
  const line=(lbl,cnt,unit,rate,amt,bold)=>{
    doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(10.2);
    doc.text(lbl,X_LABEL,y);
    if(cnt!==null){doc.text(String(cnt),X_CNT,y,{align:'right'});doc.text(unit,X_UNIT,y)}
    if(rate!==null)doc.text(rate,X_RATE,y,{align:'right'});
    doc.text('Rp',X_RP,y);
    doc.text(amt,X_AMT,y,{align:'right'});
    doc.setLineWidth(0.25);doc.line(X_RP+7,y+1.2,X_AMT,y+1.2);
    if(cnt!==null)doc.line(X_LABEL+60,y+1.2,X_CNT,y+1.2),doc.line(X_RATE-30,y+1.2,X_RATE,y+1.2);
    y+=6.3;
  };
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('Pendapatan',X_LABEL,y);y+=6.3;
  line('Gaji Pokok',null,'',null,num(x.gajiPokok));
  if(+x.tunjangan)line('Tunjangan Jabatan',null,'',null,num(x.tunjangan));
  line(x.lemburLabel||'Lembur',x.lemburJam?x.lemburJam:'-','Jam',x.lemburRate?num(x.lemburRate):'-',x.lemburJam?num(c.lemburTotal):'-');
  line('Insentif',x.insentifHari?x.insentifHari:'-','Hari',x.insentifRate?num(x.insentifRate):'-',x.insentifHari?num(c.insentifTotal):'-');
  line('Dinas Luar',x.dinasHari?x.dinasHari:'-','Hari',x.dinasRate?num(x.dinasRate):'-',x.dinasHari?num(c.dinasTotal):'-');
  line('Total Pendapatan',null,'',null,num(c.totalPendapatan),true);
  y+=7;

  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('Potongan',X_LABEL,y);y+=6.3;
  line('Kasbon',null,'',null,num(x.kasbon));
  line('Pinjaman Lunak'+(x.pinjamanKet?' '+x.pinjamanKet:''),null,'',null,num(x.pinjaman));
  line('BPJS Kesehatan',null,'',null,num(x.bpjsKes));
  line('BPJS Ketenagakerjaan',null,'',null,num(x.bpjsTK));
  line('Arisan'+(x.arisanKet?' ke-'+x.arisanKet:' ke-'),null,'',null,num(x.arisan));
  if(+x.potongCuti)line('Potong Hak Cuti',null,'',null,num(x.potongCuti));
  line('Total Potongan',null,'',null,num(c.totalPotongan),true);
  y+=8;

  doc.setFont('helvetica','bold');doc.setFontSize(11.5);

function fmtPeriodRange(period){
  if(!period)return'-';
  const[y,m]=period.split('-').map(Number);
  const start=new Date(y,m-1,26);start.setMonth(start.getMonth()-1);
  const end=new Date(y,m-1,25);
  const bln=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return `26 ${bln[start.getMonth()]} - 25 ${bln[end.getMonth()]} ${end.getFullYear()}`;
}

const CSV_TEMPLATE=`Tanggal,Tipe,Kategori,Keterangan,Jumlah
2026-01-05,Masuk,Pembayaran Proyek,Termin 1 Proyek Renovasi Gudang,15000000
2026-01-06,Keluar,Material,Beli besi & cor untuk proyek,3200000
2026-01-08,Keluar,Jasa / Upah,Upah tukang minggu 1,2500000
2026-01-10,Masuk,Penjualan Filter,Penjualan filter ke CV Rizki,4500000`;
function downloadCsvTemplate(){
  const blob=new Blob([CSV_TEMPLATE],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='template_import_transaksi.csv';a.click();
  URL.revokeObjectURL(url);
}
function parseCsvText(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
  if(!lines.length)return[];
  const splitLine=l=>{
    const out=[];let cur='';let inQ=false;
    for(let i=0;i<l.length;i++){
      const ch=l[i];
      if(ch==='"'){inQ=!inQ}
      else if(ch===','&&!inQ){out.push(cur);cur=''}
      else{cur+=ch}
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const header=splitLine(lines[0]).map(h=>h.toLowerCase());
  const idx={tanggal:header.indexOf('tanggal'),tipe:header.indexOf('tipe'),kategori:header.indexOf('kategori'),keterangan:header.indexOf('keterangan'),jumlah:header.indexOf('jumlah')};
  return lines.slice(1).map(l=>{
    const c=splitLine(l);
    return {tanggal:c[idx.tanggal]||'',tipe:c[idx.tipe]||'',kategori:c[idx.kategori]||'',keterangan:c[idx.keterangan]||'',jumlah:c[idx.jumlah]||''};
  });
}
function parseCsvDate(s){
  s=(s||'').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return today();
}
function parseCsvAmount(s){
  return Math.abs(Math.round(Number(String(s||'').replace(/[^0-9\-]/g,''))))||0;
}

async function doImportCSV(){
  const fileInput=document.getElementById('fImportCsvFile');
  const errEl=document.getElementById('fImportCsvErr');
  errEl.style.display='none';
  const file=fileInput.files[0];
  if(!file)return toast('Pilih file CSV dulu');
  const accId=document.getElementById('fImportCsvAcc').value;
  const text=await file.text();
  const rows=parseCsvText(text);
  if(!rows.length){errEl.textContent='File CSV kosong atau format kolom tidak dikenali.';errEl.style.display='block';return}
  let count=0,skipped=0;
  rows.forEach(r=>{
    const tipeRaw=(r.tipe||'').trim().toLowerCase();
    const type=tipeRaw.startsWith('masuk')||tipeRaw==='in'?'in':tipeRaw.startsWith('keluar')||tipeRaw==='out'?'out':null;
    const amount=parseCsvAmount(r.jumlah);
    const catName=(r.kategori||'').trim();
    if(!type||!amount||!catName){skipped++;return}
    const cat=getOrCreateCategory(catName,type,type==='in'?'penjualan':'operasional');
    DB.transactions.push({id:uid(),type,date:parseCsvDate(r.tanggal),desc:(r.keterangan||'').trim(),categoryId:cat.id,accountId:accId,amount});
    count++;
  });
  if(!count){errEl.textContent='Tidak ada baris valid yang bisa diimport. Cek kembali format kolom Tanggal/Tipe/Kategori/Jumlah.';errEl.style.display='block';return}
  await saveDB();closeModal();render();
  toast(`${count} transaksi berhasil diimport${skipped?`, ${skipped} baris dilewati (tidak valid)`:''}`);
}

  await saveDB();closeModal();render();toast('Data SPT tersimpan');
}
async function toggleSpt(id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');const x=DB.spt.find(v=>v.id===id);x.status=x.status==='dibayar'?'belum':'dibayar';await saveDB();render()}
async function delSpt(id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');if(!confirm('Hapus data SPT ini?'))return;DB.spt=DB.spt.filter(v=>v.id!==id);await saveDB();render();toast('Data SPT dihapus')}

function mDenda(id){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const x=DB.denda.find(v=>v.id===id)||{jenis:'',desc:'',due:'',amount:'',status:'belum'};
  openModal(`<h3>${id?'Edit':'Tambah'} Denda Pajak</h3>
    <label>Jenis Denda</label><input id="fJenis" value="${esc(x.jenis)}" placeholder="cth: Telat Lapor PPh 21">
    <label>Keterangan</label><input id="fDesc" value="${esc(x.desc)}" placeholder="cth: Keterlambatan pelaporan bulan Mei">
    <div class="row2"><div><label>Jumlah (Rp)</label><input id="fAmt" type="number" value="${x.amount}" placeholder="0"></div>
    <div><label>Jatuh Tempo</label><input id="fDue" type="date" value="${x.due}"></div></div>
    <label>Status</label><select id="fStat"><option value="belum" ${x.status!=='dibayar'?'selected':''}>Belum Dibayar</option><option value="dibayar" ${x.status==='dibayar'?'selected':''}>Sudah Dibayar</option></select>
    <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="margin-top:0" onclick="saveDenda('${id||''}')">Simpan</button></div>`);
}
async function saveDenda(id){
  if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');
  const jenis=fJenis.value.trim(),amt=+fAmt.value;
  if(!jenis)return toast('Jenis denda wajib diisi');
  if(!amt||amt<=0)return toast('Jumlah harus lebih dari 0');
  const obj={jenis,desc:fDesc.value.trim(),amount:amt,due:fDue.value,status:fStat.value};
  if(id){Object.assign(DB.denda.find(v=>v.id===id),obj)}else{DB.denda.push({id:uid(),...obj})}
  await saveDB();closeModal();render();toast('Data denda tersimpan');
}
async function toggleDenda(id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');const x=DB.denda.find(v=>v.id===id);x.status=x.status==='dibayar'?'belum':'dibayar';await saveDB();render()}
async function delDenda(id){if(!isAdmin())return toast('Akses hanya lihat — tidak bisa mengubah data');if(!confirm('Hapus data denda ini?'))return;DB.denda=DB.denda.filter(v=>v.id!==id);await saveDB();render();toast('Data denda dihapus')}

/* ================= PENGGUNA (ADMIN ONLY) ================= */
function rUsers(){
  if(!isAdmin())return `<div class="empty"><b>Akses ditolak</b>Halaman ini khusus admin.</div>`;
  return `
  <div class="page-head"><div><h2>Pengguna</h2><div class="sub">Kelola akses: admin bisa edit, viewer hanya lihat</div></div>
  <button class="btn btn-navy" onclick="mUser()">+ Tambah Pengguna</button></div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table>
    <thead><tr><th>Nama</th><th>Username</th><th>Role</th><th style="width:90px"></th></tr></thead>
    <tbody>${USERS.map(u=>`<tr>
      <td><b>${esc(u.name)}</b>${u.id===USER.id?' <span class="chip chip-navy" style="font-size:10.5px">Kamu</span>':''}</td>
      <td class="mono" style="font-size:13px">${esc(u.user)}</td>
      <td><span class="chip ${u.role==='admin'?'chip-green':'chip-amber'}">${u.role==='admin'?'Admin':'Hanya Lihat'}</span></td>
      <td class="amt">
        <button class="icon-btn" onclick="mUser('${u.id}')" title="Edit"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button>
        ${u.id!==USER.id?`<button class="icon-btn" onclick="delUser('${u.id}')" title="Hapus"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg></button>`:''}
      </td></tr>`).join('')}</tbody></table></div></div>
  <div class="card" style="margin-top:14px;background:var(--green-soft);border-color:transparent">
    <p style="font-size:13px;color:#157a51;line-height:1.7"><b>Admin</b> — akses penuh: tambah/edit/hapus data & kelola pengguna.<br><b>Hanya Lihat (Viewer)</b> — cuma bisa melihat dashboard, data, dan export laporan PDF. Semua tombol edit disembunyikan.</p>
  </div>`;
}
function mUser(id){
  if(!isAdmin())return;
  const u=USERS.find(x=>x.id===id)||{name:'',user:'',role:'viewer'};
  openModal(`<h3>${id?'Edit':'Tambah'} Pengguna</h3>
    <label>Nama Lengkap</label><input id="fName" value="${esc(u.name)}" placeholder="Nama pengguna">
    <label>Username</label><input id="fUser" value="${esc(u.user)}" placeholder="username">
    <label>Password ${id?'(kosongkan jika tidak diubah)':''}</label><input id="fPass" type="password" placeholder="${id?'••••••••':'min. 4 karakter'}">
    <label>Role</label><select id="fRole" ${id===USER.id?'disabled':''}>
      <option value="viewer" ${u.role!=='admin'?'selected':''}>Hanya Lihat (Viewer)</option>
      <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select>
    ${id===USER.id?'<p style="font-size:12px;color:var(--muted);margin-top:6px">Role akun sendiri tidak bisa diubah.</p>':''}
    <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" style="margin-top:0" onclick="saveUser('${id||''}')">Simpan</button></div>`);
}
async function saveUser(id){
  if(!isAdmin())return;
  const name=fName.value.trim(),user=fUser.value.trim(),pass=fPass.value;
  if(!name||!user)return toast('Nama & username wajib diisi');
  if(USERS.some(x=>x.user===user&&x.id!==id))return toast('Username sudah dipakai');
  if(id){
    const u=USERS.find(x=>x.id===id);
    Object.assign(u,{name,user});
    if(pass){if(pass.length<4)return toast('Password min. 4 karakter');u.pass=btoa(pass)}
    if(id!==USER.id)u.role=fRole.value;
    if(id===USER.id){USER=u;document.getElementById('uName').textContent=u.name}
  }else{
    if(pass.length<4)return toast('Password min. 4 karakter');
    USERS.push({id:uid(),name,user,pass:btoa(pass),role:fRole.value});
  }
  await sSet(K_USERS,USERS);closeModal();render();toast('Pengguna tersimpan');
}
async function delUser(id){
  if(!isAdmin()||id===USER.id)return;
  const u=USERS.find(x=>x.id===id);
  if(u.role==='admin'&&USERS.filter(x=>x.role==='admin').length<=1)return toast('Minimal harus ada 1 admin');
  if(!confirm(`Hapus pengguna "${u.name}"?`))return;
  USERS=USERS.filter(x=>x.id!==id);await sSet(K_USERS,USERS);render();toast('Pengguna dihapus');
}

/* ================= MODAL ================= */
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalBg').classList.add('open')}
function closeModal(){document.getElementById('modalBg').classList.remove('open')}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});

initApp();
</script>
